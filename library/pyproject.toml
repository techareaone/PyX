[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "PyXWizard"
version = "0.28.4"
description = "Package Python scripts into standalone Windows executables — a TRADELY PROJECT"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "TRADELY.DEV", email = "dev@tradely.dev" }
]
keywords = ["pyinstaller", "exe", "executable", "build", "windows", "bundler", "wizard"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Build Tools",
]
requires-python = ">=3.8"
dependencies = [
    "pyinstaller>=6.0",
]

[project.urls]
Homepage = "https://doc.tradely.dev"
Repository = "https://github.com/techareaone/PyX"
"Bug Tracker" = "https://discord.tradely.dev"

[tool.setuptools.packages.find]
where = ["."]
include = ["pyxwizard*"]